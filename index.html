<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find The Cat(meow)</title>
    <link rel="icon" type="image/png" href="cats/cat4.png"> <!-- we add a cat to the browser tab icon -->
    <style>
        body {
            font-family: "Segoe UI", system-ui,  sans-serif;
            text-align: center;
            background-color: #c6ccbd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0; /* to remove the margin since it can cause a scrooling wheel to appear */
            
        }

        p {
            font-size: 28px;
            color: rgb(0, 1, 2);
        }

        button {
            padding: 10px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s, background-color 0.1s;
        }

        button:hover { /* when our  mouse hovers on the buttons it turns the button green, text red and shrinks it a little*/
            transform: scale(0.96); /* makes it slightly smaller */
            background-color: #00ec08;
            color: rgb(255, 255, 255);
        }

        #cat:hover {
            cursor: pointer;
            transform: scale(1.1); /* we make the cat grow a little */
        }
       </style>

</head>
<body>

<div id="start">
<img src="cats/catStart.png" style="width: 100px;">
<h1>Find The Cat</h1>
<p>meow meow can you find me :3</p>
<button id="startBtn">Start Game</button>
</div>

<div id="game" style="display:none;">
    <h2>placeholder 67</h2>
    <p>placeholder</p>
    <div id="gameArea" style="position: relative; display: inline-block;">
    <img id="background" src="enviroment/room1.webp" alt="Background" style="width: 800px;">
    <img id="cat" src="cats/cat1.png" alt="Cat" style="position: absolute;">
    </div>
    </div>
    <div id="winScreen" style="display:none; text-align: center;">
        <h2>You Found ALL of the cats!</h2>
        <p> I hope you enjoyed finding them and looking at my project </p>
  <div id="featuredCats">
        <img src="cats/cat1.png" style="width:100px;">
        <img src="cats/cat2.png" style="width:100px;">
        <img src="cats/cat3.png" style="width:100px;">
        <img src="cats/cat4.png" style="width:100px;">
        <img src="cats/cat5.png" style="width:100px;">
        <br>
        <p> here's your reward </p>
        <img src="cats/catDance.gif">
    </div>  
</div> 
    <button id="mute" style="position: fixed; top:12px; right: 12px;">🔇</button>
    <script src="script.js"></script> <!-- we link the js file to the html -->







</body>


</html>
