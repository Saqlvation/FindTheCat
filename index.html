<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find The Cat(meow)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #81a146;
        }
       </style>

</head>
<body>

<div id="start">
<h1>Find The Cat</h1>
<p>meow meow can you find me :3</p>
<button id="startBtn">Start Game</button>
</div>


<div id="game" style="display:none;">
    <h2>Level 1</h2>
    <p> Find it!</p>
    <div id="gameArea" style="position: relative; display: inline-block;">
    <img id="background" src="enviroment/room1.webp" alt="Background" style="width: 800px;">
    <img id="cat" src="cats/cat1.png" alt="Cat" style="position: absolute; width: 80px; top: 70%; left: 15%;">
    </div>
</div>
<script>
    const startBtn = document.getElementById('startBtn');
    const startDiv = document.getElementById('start');
    const gameDiv = document.getElementById('game');
    const cat = document.getElementById('cat');

    startBtn.addEventListener('click', function() {
        startDiv.style.display = 'none';
        gameDiv.style.display = 'block';
    });

    cat.addEventListener('click', function() {
    cat.style.display = 'none';
    
    });


</script>






</body>


</html>
